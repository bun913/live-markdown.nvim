name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - runner: ubuntu-latest
            goos: linux
            goarch: amd64
            asset: live-markdown-linux-x64
          - runner: ubuntu-latest
            goos: linux
            goarch: arm64
            asset: live-markdown-linux-arm64
          - runner: macos-latest
            goos: darwin
            goarch: amd64
            asset: live-markdown-darwin-x64
          - runner: macos-latest
            goos: darwin
            goarch: arm64
            asset: live-markdown-darwin-arm64
          - runner: ubuntu-latest
            goos: windows
            goarch: amd64
            asset: live-markdown-windows-x64.exe

    runs-on: ${{ matrix.runner }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: go build -ldflags="-s -w" -o bin/${{ matrix.asset }} ./cmd/live-markdown

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: bin/${{ matrix.asset }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Update release notes
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
